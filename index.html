<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cast Director Studio | Powered by Nanobanana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Rajdhani', 'sans-serif'],
            },
            colors: {
              nano: {
                yellow: '#FACC15', // Nano Yellow
                gold: '#CA8A04',
                dark: '#020617', // Deep Onyx (Slate 950)
                panel: '#0F172A', // Slate 900
                border: '#1E293B', // Slate 800
                text: '#94A3B8' // Slate 400
              }
            },
            backgroundImage: {
              'grid-pattern': "linear-gradient(to right, #1E293B 1px, transparent 1px), linear-gradient(to bottom, #1E293B 1px, transparent 1px)",
              'radial-fade': "radial-gradient(circle at center, rgba(250, 204, 21, 0.1) 0%, transparent 70%)"
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #020617;
        color: #ffffff;
      }
      .scanner-line {
        box-shadow: 0 0 15px 2px rgba(250, 204, 21, 0.5);
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(30, 41, 59, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
